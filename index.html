<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Abteilungsbildschirm</title>
<style>
:root{
  /* Bühler-orientiertes Industriedesign */
  --blue:#004b87;
  --blue-dark:#00365f;
  --blue-light:#e8f1f9;
  --anthracite:#2b2f36;
  --anthracite-2:#3a3f47;
  --bg:#f4f6f8;
  --card:#ffffff;
  --border:#dce2e8;
  --text:#1f2429;
  --text-soft:#5b6570;
  --shadow:0 2px 10px rgba(0,40,80,.08);
  --shadow-lg:0 12px 40px rgba(0,40,80,.18);
  --radius:16px;
  /* Statusfarben */
  --green:#2e9e5b;   --green-bg:#e6f6ec;
  --yellow:#e0a400;  --yellow-bg:#fdf5df;
  --red:#d63b3b;     --red-bg:#fbe7e7;
  --info:#1976c8;    --info-bg:#e5f0fb;
  --gray:#8a929b;    --gray-bg:#eef1f4;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%}
body{
  font-family:'Segoe UI',system-ui,-apple-system,Roboto,Helvetica,Arial,sans-serif;
  background:var(--bg);color:var(--text);font-size:17px;line-height:1.4;
  overflow-x:hidden;
}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
input,select,textarea{font-family:inherit;font-size:1rem}
::-webkit-scrollbar{width:12px;height:12px}
::-webkit-scrollbar-thumb{background:#c3ccd4;border-radius:8px;border:3px solid var(--bg)}

/* ---------- Layout ---------- */
.app{display:flex;flex-direction:column;min-height:100vh}
.hidden{display:none !important}

/* ---------- Topbar ---------- */
.topbar{
  display:flex;align-items:center;gap:20px;
  background:var(--anthracite);color:#fff;
  padding:14px 26px;position:sticky;top:0;z-index:40;
  box-shadow:0 2px 12px rgba(0,0,0,.25);
}
.brand{display:flex;align-items:center;gap:14px;cursor:pointer;user-select:none}
.brand .logo{
  width:46px;height:46px;border-radius:11px;background:var(--blue);
  display:grid;place-items:center;font-weight:800;font-size:22px;letter-spacing:-1px;
  box-shadow:inset 0 0 0 2px rgba(255,255,255,.15);
}
.brand .title{font-size:20px;font-weight:700;line-height:1.1}
.brand .subtitle{font-size:12.5px;color:#aeb7c1;font-weight:500}
.topbar .clock{margin-left:6px;font-variant-numeric:tabular-nums;font-size:15px;color:#c7ced6}
.spacer{flex:1}

.dept-switch{
  display:flex;align-items:center;gap:10px;background:var(--anthracite-2);
  border-radius:12px;padding:8px 14px;cursor:pointer;transition:.15s;border:1px solid #4a4f57;
}
.dept-switch:hover{background:#464b53}
.dept-switch .dot{width:11px;height:11px;border-radius:50%;background:var(--blue)}
.dept-switch .name{font-weight:600;font-size:16px}
.dept-switch .chev{color:#9aa3ad;font-size:13px}

.user-chip{
  display:flex;align-items:center;gap:11px;padding:7px 8px 7px 14px;
  background:var(--anthracite-2);border-radius:30px;border:1px solid #4a4f57;
}
.user-chip .u-info{text-align:right;line-height:1.15}
.user-chip .u-name{font-weight:600;font-size:14.5px}
.user-chip .u-role{font-size:11.5px;color:#9aa3ad}
.user-chip .avatar{
  width:38px;height:38px;border-radius:50%;background:var(--blue);
  display:grid;place-items:center;font-weight:700;font-size:15px;color:#fff;
}
.btn-icon-top{
  width:44px;height:44px;border-radius:11px;background:var(--anthracite-2);
  display:grid;place-items:center;font-size:19px;border:1px solid #4a4f57;transition:.15s;
}
.btn-icon-top:hover{background:#464b53}

/* ---------- Buttons ---------- */
.btn{
  display:inline-flex;align-items:center;justify-content:center;gap:9px;
  padding:13px 22px;border-radius:12px;font-weight:600;font-size:16px;
  background:var(--blue);color:#fff;transition:.15s;white-space:nowrap;
}
.btn:hover{background:var(--blue-dark)}
.btn:active{transform:translateY(1px)}
.btn.ghost{background:#fff;color:var(--blue);border:2px solid var(--border)}
.btn.ghost:hover{border-color:var(--blue);background:var(--blue-light)}
.btn.subtle{background:var(--gray-bg);color:var(--text)}
.btn.subtle:hover{background:#e2e7ec}
.btn.danger{background:var(--red)}
.btn.danger:hover{background:#b93030}
.btn.sm{padding:9px 15px;font-size:14px;border-radius:10px}
.btn.lg{padding:17px 30px;font-size:19px}
.btn:disabled{opacity:.5;cursor:not-allowed}

/* ---------- Main / Home ---------- */
main{flex:1;padding:26px clamp(16px,4vw,42px)}
.page-head{display:flex;align-items:flex-end;justify-content:space-between;margin-bottom:22px;flex-wrap:wrap;gap:16px}
.page-head h1{font-size:clamp(26px,3.4vw,40px);font-weight:800;letter-spacing:-.5px;color:var(--anthracite)}
.page-head .sub{color:var(--text-soft);font-size:16px;margin-top:4px}
.breadcrumb{display:flex;align-items:center;gap:8px;color:var(--text-soft);font-size:15px;margin-bottom:14px}
.breadcrumb b{color:var(--blue)}

/* Ticker */
.ticker{
  display:flex;align-items:center;gap:14px;background:var(--red);color:#fff;
  border-radius:12px;padding:12px 18px;margin-bottom:22px;overflow:hidden;box-shadow:var(--shadow);
}
.ticker.info{background:var(--info)}
.ticker .lbl{font-weight:800;font-size:13px;text-transform:uppercase;letter-spacing:1px;background:rgba(255,255,255,.2);padding:5px 11px;border-radius:20px;white-space:nowrap}
.ticker .track{flex:1;overflow:hidden;white-space:nowrap}
.ticker .track span{display:inline-block;padding-left:100%;animation:scroll 26s linear infinite;font-weight:600;font-size:16px}
@keyframes scroll{from{transform:translateX(0)}to{transform:translateX(-100%)}}

/* Tiles grid */
.tiles{
  display:grid;gap:22px;
  grid-template-columns:repeat(auto-fill,minmax(280px,1fr));
}
.tile{
  background:var(--card);border-radius:var(--radius);box-shadow:var(--shadow);
  border:1px solid var(--border);overflow:hidden;cursor:pointer;
  transition:transform .18s,box-shadow .18s;display:flex;flex-direction:column;
  min-height:210px;position:relative;
}
.tile:hover{transform:translateY(-4px);box-shadow:var(--shadow-lg)}
.tile:active{transform:translateY(-1px)}
.tile .tile-top{padding:22px 22px 0;display:flex;align-items:flex-start;justify-content:space-between}
.tile .ic{
  width:62px;height:62px;border-radius:15px;display:grid;place-items:center;font-size:31px;
  background:var(--blue-light);
}
.tile .badge-count{
  min-width:30px;height:30px;padding:0 9px;border-radius:15px;background:var(--red);color:#fff;
  font-weight:700;font-size:15px;display:grid;place-items:center;
}
.tile .badge-count.q{background:var(--yellow)}
.tile .tile-body{padding:16px 22px 22px;flex:1;display:flex;flex-direction:column}
.tile h3{font-size:22px;font-weight:700;margin-bottom:6px;color:var(--anthracite)}
.tile .desc{color:var(--text-soft);font-size:15px;flex:1}
.tile .tile-foot{
  display:flex;align-items:center;gap:8px;margin-top:14px;font-size:14px;color:var(--text-soft);
  padding-top:12px;border-top:1px solid var(--border);
}
.tile .pip{width:9px;height:9px;border-radius:50%}
.tile.pinned::after{content:"★";position:absolute;top:14px;right:16px;color:var(--yellow);font-size:15px;opacity:0}

/* status pips */
.s-green{background:var(--green)} .s-yellow{background:var(--yellow)}
.s-red{background:var(--red)} .s-info{background:var(--info)} .s-gray{background:var(--gray)}

/* ---------- Badges / chips ---------- */
.badge{display:inline-flex;align-items:center;gap:6px;padding:4px 11px;border-radius:20px;font-size:13px;font-weight:600}
.badge .b-dot{width:8px;height:8px;border-radius:50%}
.b-green{background:var(--green-bg);color:#1c6b3c} .b-green .b-dot{background:var(--green)}
.b-yellow{background:var(--yellow-bg);color:#8a6400} .b-yellow .b-dot{background:var(--yellow)}
.b-red{background:var(--red-bg);color:#a52626} .b-red .b-dot{background:var(--red)}
.b-info{background:var(--info-bg);color:#1259a0} .b-info .b-dot{background:var(--info)}
.b-gray{background:var(--gray-bg);color:#5b6570} .b-gray .b-dot{background:var(--gray)}

/* ---------- Overlay / Modal ---------- */
.overlay{
  position:fixed;inset:0;background:rgba(20,26,32,.55);backdrop-filter:blur(3px);
  z-index:80;display:flex;align-items:stretch;justify-content:center;padding:0;
  animation:fade .2s;
}
@keyframes fade{from{opacity:0}to{opacity:1}}
.sheet{
  background:var(--bg);width:100%;max-width:1400px;margin:0 auto;
  display:flex;flex-direction:column;box-shadow:var(--shadow-lg);animation:slideup .25s;
}
@keyframes slideup{from{transform:translateY(24px);opacity:.6}to{transform:translateY(0);opacity:1}}
.sheet-head{
  display:flex;align-items:center;gap:16px;padding:18px 26px;background:var(--card);
  border-bottom:1px solid var(--border);position:sticky;top:0;z-index:5;
}
.sheet-head .s-ic{width:52px;height:52px;border-radius:13px;background:var(--blue-light);display:grid;place-items:center;font-size:26px}
.sheet-head h2{font-size:25px;font-weight:800;color:var(--anthracite)}
.sheet-head .s-sub{font-size:14px;color:var(--text-soft)}
.btn-back{
  display:inline-flex;align-items:center;gap:9px;padding:12px 20px;border-radius:12px;
  background:var(--anthracite);color:#fff;font-weight:600;font-size:16px;
}
.btn-back:hover{background:#000}
.btn-close{width:48px;height:48px;border-radius:12px;background:var(--gray-bg);display:grid;place-items:center;font-size:22px}
.btn-close:hover{background:#e2e7ec}
.sheet-body{flex:1;overflow-y:auto;padding:26px clamp(16px,3vw,34px)}

/* Modal small (centered) */
.modal-wrap{position:fixed;inset:0;background:rgba(20,26,32,.55);backdrop-filter:blur(3px);z-index:90;display:grid;place-items:center;padding:20px;animation:fade .2s}
.modal{background:var(--card);border-radius:18px;width:100%;max-width:560px;max-height:92vh;overflow:hidden;display:flex;flex-direction:column;box-shadow:var(--shadow-lg);animation:slideup .22s}
.modal.wide{max-width:820px}
.modal-head{display:flex;align-items:center;justify-content:space-between;padding:20px 24px;border-bottom:1px solid var(--border)}
.modal-head h3{font-size:21px;font-weight:700}
.modal-body{padding:22px 24px;overflow-y:auto}
.modal-foot{display:flex;gap:12px;justify-content:flex-end;padding:16px 24px;border-top:1px solid var(--border);background:var(--bg)}

/* ---------- Forms ---------- */
.field{margin-bottom:18px}
.field label{display:block;font-weight:600;font-size:14.5px;margin-bottom:7px;color:var(--anthracite)}
.field label .req{color:var(--red)}
.field .hint{font-size:12.5px;color:var(--text-soft);margin-top:5px}
.input,.select,.textarea{
  width:100%;padding:13px 15px;border:2px solid var(--border);border-radius:11px;
  background:#fff;color:var(--text);transition:.15s;
}
.input:focus,.select:focus,.textarea:focus{outline:none;border-color:var(--blue);box-shadow:0 0 0 3px rgba(0,75,135,.1)}
.textarea{resize:vertical;min-height:90px}
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.grid-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:16px}
.check{display:flex;align-items:center;gap:11px;padding:12px 15px;border:2px solid var(--border);border-radius:11px;cursor:pointer;transition:.15s}
.check:hover{border-color:var(--blue)}
.check input{width:20px;height:20px;accent-color:var(--blue)}

/* ---------- Toolbar (Docs) ---------- */
.toolbar{
  display:flex;gap:12px;flex-wrap:wrap;align-items:center;
  background:var(--card);border:1px solid var(--border);border-radius:14px;
  padding:14px 16px;margin-bottom:20px;box-shadow:var(--shadow);
}
.search{flex:1;min-width:240px;display:flex;align-items:center;gap:10px;background:var(--bg);border:2px solid var(--border);border-radius:11px;padding:0 14px}
.search:focus-within{border-color:var(--blue)}
.search input{border:none;background:none;padding:13px 0;flex:1;outline:none;font-size:16px}
.search .mag{font-size:18px;color:var(--text-soft)}
.filter-select{padding:12px 14px;border:2px solid var(--border);border-radius:11px;background:#fff;font-size:15px;min-width:130px}

/* ---------- Table ---------- */
.table-wrap{background:var(--card);border:1px solid var(--border);border-radius:14px;overflow:hidden;box-shadow:var(--shadow)}
table{width:100%;border-collapse:collapse}
thead th{
  text-align:left;padding:15px 18px;font-size:13px;text-transform:uppercase;letter-spacing:.5px;
  color:var(--text-soft);background:var(--bg);border-bottom:2px solid var(--border);white-space:nowrap;cursor:pointer;user-select:none;
}
thead th:hover{color:var(--blue)}
tbody td{padding:15px 18px;border-bottom:1px solid var(--border);font-size:15px;vertical-align:middle}
tbody tr{transition:.12s}
tbody tr:hover{background:var(--blue-light)}
tbody tr:last-child td{border-bottom:none}
.file-cell{display:flex;align-items:center;gap:13px}
.file-ic{width:44px;height:44px;border-radius:10px;display:grid;place-items:center;font-size:20px;font-weight:700;color:#fff;flex-shrink:0}
.fi-pdf{background:#d63b3b} .fi-doc{background:#2b579a} .fi-xls{background:#217346}
.fi-ppt{background:#d24726} .fi-img{background:#7b4fc0} .fi-other{background:#6b7480}
.file-cell .f-title{font-weight:600;color:var(--text)}
.file-cell .f-name{font-size:12.5px;color:var(--text-soft)}
.row-actions{display:flex;gap:7px;justify-content:flex-end}
.ico-btn{width:38px;height:38px;border-radius:9px;background:var(--gray-bg);display:grid;place-items:center;font-size:16px;transition:.12s}
.ico-btn:hover{background:#e2e7ec}
.ico-btn.danger:hover{background:var(--red-bg);color:var(--red)}

/* Doc grid cards (preview mode) */
.doc-grid{display:grid;gap:18px;grid-template-columns:repeat(auto-fill,minmax(240px,1fr))}
.doc-card{background:var(--card);border:1px solid var(--border);border-radius:14px;overflow:hidden;box-shadow:var(--shadow);cursor:pointer;transition:.16s;display:flex;flex-direction:column}
.doc-card:hover{transform:translateY(-3px);box-shadow:var(--shadow-lg)}
.doc-thumb{height:150px;display:grid;place-items:center;font-size:44px;color:#fff;position:relative}
.doc-thumb .imp{position:absolute;top:10px;left:10px;background:var(--yellow);color:#5a4200;font-size:11px;font-weight:800;padding:4px 9px;border-radius:16px;text-transform:uppercase;letter-spacing:.5px}
.doc-card .dc-body{padding:14px 15px;flex:1;display:flex;flex-direction:column;gap:6px}
.doc-card .dc-title{font-weight:700;font-size:16px}
.doc-card .dc-meta{font-size:12.5px;color:var(--text-soft)}

/* Mini thumbnails on gallery tile (start page) */
.mini-grid{display:flex;flex-wrap:wrap;gap:9px;margin-top:8px;flex:1;align-content:flex-start}
.mini-thumb{width:54px;height:62px;border-radius:9px;display:grid;place-items:center;font-size:23px;color:#fff;cursor:pointer;box-shadow:0 2px 7px rgba(0,0,0,.14);transition:transform .14s;position:relative}
.mini-thumb:hover{transform:scale(1.09)}
.mini-thumb.more{background:var(--gray-bg);color:var(--text-soft);font-size:15px;font-weight:700;box-shadow:none}
.tile.gallery{min-height:230px}
@media(min-width:900px){.tile.gallery{grid-column:span 2}}

/* ---------- Info panels ---------- */
.panel{background:var(--card);border:1px solid var(--border);border-radius:14px;box-shadow:var(--shadow);overflow:hidden;margin-bottom:20px}
.panel-head{display:flex;align-items:center;justify-content:space-between;padding:16px 20px;border-bottom:1px solid var(--border);background:var(--bg)}
.panel-head h3{font-size:18px;font-weight:700}
.panel-body{padding:20px}
.cols{display:grid;gap:20px;grid-template-columns:repeat(auto-fit,minmax(320px,1fr))}

/* KPI cards */
.kpi-grid{display:grid;gap:18px;grid-template-columns:repeat(auto-fill,minmax(230px,1fr))}
.kpi{background:var(--card);border:1px solid var(--border);border-left:6px solid var(--blue);border-radius:14px;padding:20px;box-shadow:var(--shadow)}
.kpi.g{border-left-color:var(--green)} .kpi.y{border-left-color:var(--yellow)} .kpi.r{border-left-color:var(--red)}
.kpi .k-label{font-size:14px;color:var(--text-soft);font-weight:600}
.kpi .k-val{font-size:40px;font-weight:800;letter-spacing:-1px;margin:6px 0 2px;color:var(--anthracite)}
.kpi .k-val small{font-size:20px;font-weight:600;color:var(--text-soft)}
.kpi .k-trend{font-size:13.5px;font-weight:600;display:flex;align-items:center;gap:5px}
.kpi .k-bar{height:8px;border-radius:5px;background:var(--gray-bg);margin-top:12px;overflow:hidden}
.kpi .k-bar span{display:block;height:100%;border-radius:5px;background:var(--blue)}

/* Shift plan */
.shift-table td,.shift-table th{text-align:center}
.shift-cell{font-weight:700;border-radius:8px;padding:8px 4px;font-size:14px}
.sh-F{background:var(--info-bg);color:#1259a0} .sh-S{background:var(--yellow-bg);color:#8a6400}
.sh-N{background:#e7e3f5;color:#5535a8} .sh-off{background:var(--gray-bg);color:#98a1aa}

/* List rows (projects, tasks, events, news) */
.list-row{display:flex;gap:16px;align-items:flex-start;padding:16px 18px;border-bottom:1px solid var(--border)}
.list-row:last-child{border-bottom:none}
.list-row:hover{background:var(--blue-light)}
.lr-main{flex:1;min-width:0}
.lr-title{font-weight:700;font-size:17px;margin-bottom:3px}
.lr-sub{color:var(--text-soft);font-size:14px}
.lr-side{text-align:right;white-space:nowrap;display:flex;flex-direction:column;align-items:flex-end;gap:6px}
.prog{height:9px;border-radius:6px;background:var(--gray-bg);overflow:hidden;margin-top:8px;width:100%}
.prog span{display:block;height:100%;border-radius:6px;background:var(--blue)}

/* Events */
.event-row{display:flex;gap:16px;align-items:center;padding:14px 18px;border-bottom:1px solid var(--border)}
.event-row:last-child{border-bottom:none}
.date-chip{width:64px;height:64px;border-radius:12px;background:var(--blue);color:#fff;display:grid;place-items:center;text-align:center;flex-shrink:0;line-height:1.05}
.date-chip .d{font-size:24px;font-weight:800}
.date-chip .m{font-size:12px;text-transform:uppercase;letter-spacing:1px}

/* Toast */
.toast-wrap{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);z-index:200;display:flex;flex-direction:column;gap:10px;align-items:center}
.toast{background:var(--anthracite);color:#fff;padding:14px 22px;border-radius:12px;font-weight:600;box-shadow:var(--shadow-lg);display:flex;align-items:center;gap:11px;animation:slideup .25s;min-width:280px}
.toast.ok{background:var(--green)} .toast.err{background:var(--red)} .toast.info{background:var(--blue)}

/* Dropzone */
.dropzone{border:3px dashed var(--border);border-radius:16px;padding:34px 20px;text-align:center;transition:.15s;background:var(--bg);cursor:pointer}
.dropzone.over{border-color:var(--blue);background:var(--blue-light)}
.dropzone .dz-ic{font-size:46px;margin-bottom:10px}
.dropzone h4{font-size:19px;margin-bottom:5px}
.dropzone p{color:var(--text-soft);font-size:14px}
.file-list{margin-top:16px;display:flex;flex-direction:column;gap:10px}
.file-item{display:flex;align-items:center;gap:12px;padding:11px 14px;background:var(--card);border:1px solid var(--border);border-radius:11px}
.file-item .fi-name{flex:1;font-weight:600;font-size:14.5px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.file-item .fi-size{font-size:12.5px;color:var(--text-soft)}

/* Login */
.login-screen{position:fixed;inset:0;background:linear-gradient(135deg,var(--anthracite),var(--blue-dark));display:grid;place-items:center;z-index:100;padding:20px}
.login-card{background:#fff;border-radius:22px;width:100%;max-width:430px;padding:40px 36px;box-shadow:var(--shadow-lg)}
.login-card .logo{width:64px;height:64px;border-radius:16px;background:var(--blue);display:grid;place-items:center;font-weight:800;font-size:30px;color:#fff;margin:0 auto 18px}
.login-card h2{text-align:center;font-size:26px;margin-bottom:5px}
.login-card .lsub{text-align:center;color:var(--text-soft);margin-bottom:26px;font-size:15px}
.quick-users{display:flex;flex-direction:column;gap:9px;margin-top:8px}
.qu{display:flex;align-items:center;gap:12px;padding:12px 14px;border:2px solid var(--border);border-radius:12px;transition:.15s;text-align:left;width:100%}
.qu:hover{border-color:var(--blue);background:var(--blue-light)}
.qu .avatar{width:40px;height:40px;border-radius:50%;background:var(--blue);color:#fff;display:grid;place-items:center;font-weight:700}
.qu .qu-info{flex:1}
.qu .qu-name{font-weight:700}
.qu .qu-role{font-size:12.5px;color:var(--text-soft)}

/* Tabs */
.tabs{display:flex;gap:6px;border-bottom:2px solid var(--border);margin-bottom:22px;overflow-x:auto}
.tab{padding:13px 20px;font-weight:600;font-size:16px;color:var(--text-soft);border-bottom:3px solid transparent;margin-bottom:-2px;white-space:nowrap}
.tab.active{color:var(--blue);border-bottom-color:var(--blue)}
.tab:hover{color:var(--blue)}

/* Empty state */
.empty{text-align:center;padding:60px 20px;color:var(--text-soft)}
.empty .e-ic{font-size:56px;margin-bottom:14px;opacity:.6}
.empty h3{font-size:20px;margin-bottom:6px;color:var(--text)}

/* Preview area */
.preview-stage{background:#2b2f36;border-radius:14px;min-height:420px;display:grid;place-items:center;padding:30px;position:relative;overflow:hidden}
.preview-doc{background:#fff;border-radius:6px;box-shadow:0 10px 40px rgba(0,0,0,.4);max-width:640px;width:100%;padding:48px 54px;min-height:380px}
.preview-doc h1{font-size:26px;margin-bottom:14px;color:#111}
.preview-doc p{color:#444;margin-bottom:11px;font-size:15px;line-height:1.7}
.preview-doc .ph-line{height:11px;background:#e6e9ed;border-radius:4px;margin-bottom:11px}
.preview-img{max-width:100%;max-height:60vh;border-radius:8px;box-shadow:0 10px 40px rgba(0,0,0,.4)}
.preview-file-ic{text-align:center;color:#fff}
.preview-file-ic .big{font-size:90px;margin-bottom:14px}

/* Meta grid in preview */
.meta-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:14px 24px;margin-top:6px}
.meta-item .m-k{font-size:12.5px;color:var(--text-soft);text-transform:uppercase;letter-spacing:.4px;margin-bottom:3px}
.meta-item .m-v{font-weight:600;font-size:15.5px}

/* Version list */
.ver-item{display:flex;align-items:center;gap:12px;padding:11px 0;border-bottom:1px solid var(--border);font-size:14.5px}
.ver-item:last-child{border-bottom:none}
.ver-tag{background:var(--blue);color:#fff;font-weight:700;padding:3px 10px;border-radius:8px;font-size:13px}
.ver-tag.old{background:var(--gray)}

/* Audit log */
.log-item{display:flex;gap:14px;padding:13px 0;border-bottom:1px solid var(--border);font-size:14.5px;align-items:flex-start}
.log-item:last-child{border-bottom:none}
.log-ic{width:36px;height:36px;border-radius:9px;background:var(--blue-light);display:grid;place-items:center;font-size:16px;flex-shrink:0}
.log-time{color:var(--text-soft);font-size:12.5px;white-space:nowrap}

/* Section title */
.sec-title{font-size:15px;font-weight:700;text-transform:uppercase;letter-spacing:.6px;color:var(--text-soft);margin:26px 0 12px}
.sec-title:first-child{margin-top:0}

/* Responsive */
@media(max-width:760px){
  body{font-size:16px}
  .topbar{padding:11px 14px;gap:10px;flex-wrap:wrap}
  .brand .subtitle{display:none}
  .user-chip .u-info{display:none}
  .dept-switch .name{max-width:110px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  main{padding:18px 14px}
  .grid-2,.grid-3{grid-template-columns:1fr}
  .sheet-head{padding:14px 16px;flex-wrap:wrap}
  .sheet-head h2{font-size:20px}
  .clock{display:none}
  thead th:nth-child(n+4),tbody td:nth-child(n+4){display:none}
  .row-actions{flex-wrap:wrap}
}
.role-hide{display:none !important}

function load(){
  try{ const s=localStorage.getItem(LS_KEY); if(s) return JSON.parse(s); }catch(e){}
  const d=seed(); localStorage.setItem(LS_KEY,JSON.stringify(d)); return d;
}
function save(){ localStorage.setItem(LS_KEY,JSON.stringify(DB)); }
function resetDB(){ localStorage.removeItem(LS_KEY); DB=load(); toast('Daten zurückgesetzt','info'); render(); }

/* ---------- Helpers ---------- */
const $=(s,r=document)=>r.querySelector(s);
const el=(t,c,h)=>{const e=document.createElement(t);if(c)e.className=c;if(h!=null)e.innerHTML=h;return e;};
const uid=p=>p+Math.random().toString(36).slice(2,8);
function esc(s){return (s==null?'':String(s)).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));}
function fmtSize(b){if(!b)return '—';const u=['B','KB','MB','GB'];let i=0,n=b;while(n>=1024&&i<3){n/=1024;i++;}return n.toFixed(n<10&&i>0?1:0)+' '+u[i];}
function fmtDate(s){if(!s)return '—';const[y,m,d]=s.split('-');return `${d}.${m}.${y}`;}
function today(){return '2026-07-15';}
function nowStamp(){return '2026-07-15 '+new Date().toTimeString().slice(0,5);}
const dept=id=>DB.departments.find(d=>d.id===(id||session.dept));
const user=()=>session.user;

/* Role helpers */
function isSys(){return user()&&user().role==='sysadmin';}
function isAdmin(){const u=user();return u&&(u.role==='sysadmin'||u.role==='deptadmin');}
function canEditDept(dId){const u=user();if(!u)return false;if(u.role==='sysadmin')return true;return u.role==='deptadmin'&&u.dept===dId;}
function allowedDepts(){const u=user();if(!u)return DB.departments;if(u.role==='sysadmin')return DB.departments;if(u.role==='deptadmin')return DB.departments.filter(d=>d.id===u.dept);return DB.departments.filter(d=>d.id===u.dept);}

/* filtered data for current dept, employees see only published */
function visibleDocs(dId){let ds=DB.documents.filter(d=>d.dept===(dId||session.dept));if(!isAdmin())ds=ds.filter(d=>d.status==='published');return ds;}
function pubOnly(arr,key='status'){return isAdmin()?arr:arr.filter(x=>x[key]!=='draft'&&x[key]!=='archived');}

/* ---------- Toast ---------- */
function toast(msg,type=''){const t=el('div','toast '+type);t.innerHTML=`<span>${type==='ok'?'✓':type==='err'?'✕':type==='info'?'ℹ':'•'}</span> ${esc(msg)}`;$('#toastWrap').appendChild(t);setTimeout(()=>{t.style.opacity='0';t.style.transition='.3s';setTimeout(()=>t.remove(),300);},2600);}

/* ---------- Log ---------- */
function logAction(action,target,ic='•'){DB.log.unshift({id:uid('l'),time:nowStamp(),user:user()?user().name:'System',action,target,ic});DB.log=DB.log.slice(0,60);save();}

  app.appendChild(main);
  renderHome(main);

      <div class="logo">B</div>
      <div>
        <div class="title">Abteilungsbildschirm</div>
        <div class="subtitle">Digitale Informationszentrale</div>

    <div class="spacer"></div>

      <span class="name">${esc(d.name)}</span>

}

function renderHome(main){

  const crit=pubOnly(DB.news.filter(n=>n.dept===d.id)).filter(n=>n.status==='red'||n.status==='yellow');
  let html='';
  if(crit.length){
    const isRed=crit.some(n=>n.status==='red');
    html+=`<div class="ticker ${isRed?'':'info'}"><span class="lbl">${isRed?'⚠ Wichtig':'ℹ Hinweis'}</span><div class="track"><span>${crit.map(n=>esc(n.title)).join('  ●  ')}  ●  ${crit.map(n=>esc(n.title)).join('  ●  ')}</span></div></div>`;
  }
  html+=`<div class="page-head">
    <div>
      <h1>${d.icon} ${esc(d.name)}</h1>
      <div class="sub">${esc(d.location)} · ${DB.info[d.id]?DB.info[d.id].members+' Mitarbeitende':''} · Übersicht ${fmtDate(today())}</div>
    </div>
    ${isAdmin()?`<button class="btn ghost" onclick="openAdmin()">⚙️ Inhalte verwalten</button>`:''}
  </div>`;

  html+='<div class="tiles" id="tiles"></div>';
  main.innerHTML=html;

  const grid=$('#tiles',main);

  });
  if(!layout.length)grid.innerHTML=empty('🧩','Keine Kacheln aktiv',isAdmin()?'Über ⚙️ Administration → Startseite Kacheln hinzufügen':'');
}

/* Ensure per-department layout exists (migration for older data) */
function ensureLayout(){
  if(!DB.layout)DB.layout={};
  let changed=false;
  DB.departments.forEach(d=>{
    if(!DB.layout[d.id]){
      DB.layout[d.id]=(DB.tileOrder||Object.keys(TILES)).map(k=>({id:uid('tl'),type:'builtin',key:k}));
      if(d.id==='prod'){ // Demo-Galerie zeigt Mini-Vorschau-Feature
        DB.layout[d.id].splice(1,0,{id:uid('gl'),type:'docgallery',title:'Wichtige Dokumente',icon:'⭐',color:'#004b87',docIds:['d1','d2','d3','d4']});
      }
      changed=true;
    }
  });
  if(changed)save();
}

/* Document-gallery tile with small previews directly on the start page */
function galleryTileEl(item,d){
  let docs=(item.docIds||[]).map(id=>DB.documents.find(x=>x.id===id)).filter(Boolean);
  if(!isAdmin())docs=docs.filter(x=>x.status==='published');
  const tile=el('div','tile gallery');
  tile.onclick=()=>openGallery(item.id);
  const shown=docs.slice(0,6);
  const more=docs.length-shown.length;
  tile.innerHTML=`
    <div class="tile-top">
      <div class="ic" style="background:${item.color}22">${item.icon}</div>
      ${docs.length?`<span class="badge-count q" style="background:var(--blue)">${docs.length}</span>`:''}
    </div>
    <div class="tile-body">
      <h3>${esc(item.title)}</h3>
      <div class="mini-grid">${shown.map(miniThumb).join('')}${more>0?`<div class="mini-thumb more">+${more}</div>`:''}${!docs.length?'<span style="color:var(--text-soft);font-size:14px">Keine Dokumente zugewiesen</span>':''}</div>
      <div class="tile-foot"><span class="pip s-info"></span> Dokumente · tippen zum Öffnen</div>
    </div>`;
  return tile;
}
function miniThumb(x){
  const[fc]=fileMeta(x.fileType);
  const isImg=['png','jpg','jpeg','gif','svg'].includes(x.fileType);
  const bg=fc==='fi-pdf'?'#d63b3b':fc==='fi-doc'?'#2b579a':fc==='fi-xls'?'#217346':fc==='fi-ppt'?'#d24726':fc==='fi-img'?'#7b4fc0':'#6b7480';
  const ic=isImg?'🖼️':fc==='fi-xls'?'📊':fc==='fi-ppt'?'📽️':fc==='fi-doc'?'📝':'📄';
  return `<div class="mini-thumb" title="${esc(x.title)}" style="background:linear-gradient(135deg,${bg},${bg}cc)" onclick="event.stopPropagation();openDoc('${x.id}')">${ic}</div>`;
}
function openGallery(id){
  const g=(DB.layout[session.dept]||[]).find(x=>x.id===id);if(!g)return;
  let docs=(g.docIds||[]).map(i=>DB.documents.find(x=>x.id===i)).filter(Boolean);
  if(!isAdmin())docs=docs.filter(x=>x.status==='published');
  const body=el('div');
  if(!docs.length)body.innerHTML=empty('📁','Keine Dokumente',canEditDept(session.dept)?'In der Administration → Startseite Dokumente zuweisen':'');
  else body.appendChild(docGrid(docs));
  const editBtn=canEditDept(session.dept)?`<button class="btn ghost sm" onclick="closeOverlay();openAdmin('tiles');setTimeout(()=>editGallery('${g.id}'),60)">✎ Galerie bearbeiten</button>`:'';
  openOverlay(sheet(g.title,g.icon,dept().name+' · '+docs.length+' Dokument(e)',body,editBtn));
}

function counts(key,dId){
  switch(key){
    case 'tasks':{const t=pubOnly(DB.tasks.filter(x=>x.dept===dId)).filter(x=>!x.done);return{n:t.filter(x=>x.status==='red').length,q:t.length};}
    case 'docs':return{n:0,q:visibleDocs(dId).length};
    case 'news':return{n:pubOnly(DB.news.filter(x=>x.dept===dId)).filter(n=>n.status==='red').length,q:pubOnly(DB.news.filter(x=>x.dept===dId)).length};
    case 'projects':return{n:DB.projects.filter(x=>x.dept===dId&&x.status==='red').length,q:DB.projects.filter(x=>x.dept===dId).length};
    case 'events':return{n:0,q:DB.events.filter(x=>x.dept===dId).length};
    case 'kpis':return{n:DB.kpis.filter(x=>x.dept===dId&&x.status==='red').length,q:DB.kpis.filter(x=>x.dept===dId).length};
    default:return{n:0,q:0};
  }
}
function statusPip(key,dId){
  if(key==='tasks'||key==='kpis'){const c=counts(key,dId);if(c.n>0)return['s-red','Kritisch'];}
  if(key==='projects'){if(DB.projects.some(p=>p.dept===dId&&p.status==='red'))return['s-red','Achtung'];if(DB.projects.some(p=>p.dept===dId&&p.status==='yellow'))return['s-yellow','In Arbeit'];return['s-green','OK'];}
  if(key==='news'){const c=counts('news',dId);if(c.n>0)return['s-red','Wichtig'];}
  return['s-green','Aktuell'];
}

function tileEl(key,t,d){
  const c=counts(key,d.id);
  const[pip,pipTxt]=statusPip(key,d.id);
  const tile=el('div','tile');
  tile.onclick=()=>openTile(key);
  let badgeHtml='';
  if(c.n>0)badgeHtml=`<span class="badge-count">${c.n}</span>`;
  else if(c.q>0&&(key==='docs'||key==='tasks'||key==='news'||key==='events'))badgeHtml=`<span class="badge-count q" style="background:var(--blue)">${c.q}</span>`;
  tile.innerHTML=`
    <div class="tile-top">
      <div class="ic" style="background:${t.bg}">${t.icon}</div>
      ${badgeHtml}
    </div>
    <div class="tile-body">
      <h3>${esc(t.name)}</h3>
      <div class="desc">${esc(t.desc)}</div>
      <div class="tile-foot"><span class="pip ${pip}"></span> ${pipTxt}</div>
    </div>`;
  return tile;
}

function filterDocs(d){
  let ds=visibleDocs(d.id);
  const f=ui.docFilters,q=ui.docSearch.trim().toLowerCase();
  if(q)ds=ds.filter(x=>[x.title,x.fileName,x.category,x.desc,x.owner].some(v=>(v||'').toLowerCase().includes(q)));
  if(f.cat)ds=ds.filter(x=>x.category===f.cat);
  if(f.type)ds=ds.filter(x=>x.fileType===f.type||(f.type==='png'&&['png','jpg','jpeg','gif','svg'].includes(x.fileType)));
  if(f.status)ds=ds.filter(x=>x.status===f.status);
  if(f.imp)ds=ds.filter(x=>x.important);
  if(ui.docSort==='name')ds.sort((a,b)=>a.title.localeCompare(b.title));
  else if(ui.docSort==='prio')ds.sort((a,b)=>(b.important?1:0)-(a.important?1:0)||b.uploaded.localeCompare(a.uploaded));
  else ds.sort((a,b)=>b.uploaded.localeCompare(a.uploaded));
  return ds;
}

function openUpload(editId){

    ${!x?`<div class="dropzone" id="dz">

      <p>oder klicken zum Auswählen · PDF, Word, Excel, PowerPoint, Bilder · max. ${MAX_MB} MB</p>
      <input type="file" id="fileInput" multiple accept=".pdf,.doc,.docx,.xls,.xlsx,.ppt,.pptx,.png,.jpg,.jpeg,.gif,.svg" style="display:none">
      <div class="file-list" id="fileList"></div>
    </div>`:`<div class="panel"><div class="panel-body" style="display:flex;align-items:center;gap:14px">
      <div class="file-ic ${fileMeta(x.fileType)[0]}">${fileMeta(x.fileType)[1]}</div>

    </div></div>`}
    <div class="field"><label>Titel <span class="req">*</span></label><input class="input" id="upTitle" value="${x?esc(x.title):''}" placeholder="z.B. Arbeitsanweisung Linie 4"></div>
    <div class="field"><label>Beschreibung</label><textarea class="textarea" id="upDesc" placeholder="Kurze Beschreibung des Inhalts…">${x?esc(x.desc):''}</textarea></div>
    <div class="grid-2">
      <div class="field"><label>Kategorie <span class="req">*</span></label>
        <select class="select" id="upCat">${cats.map(c=>`<option ${x&&x.category===c?'selected':''}>${esc(c)}</option>`).join('')}<option value="__new">+ Neue Kategorie…</option></select>
        <input class="input hidden" id="upCatNew" placeholder="Name neue Kategorie" style="margin-top:8px">
      </div>
      <div class="field"><label>Projekt / Themenbereich</label>
        <select class="select" id="upProj"><option value="">— Keines —</option>${projs.map(p=>`<option value="${p.id}" ${x&&x.project===p.id?'selected':''}>${esc(p.name)}</option>`).join('')}</select>
      </div>
    </div>
    <div class="grid-3">
      <div class="field"><label>Verantwortliche Person</label><input class="input" id="upOwner" value="${x?esc(x.owner):(user()?esc(user().name):'')}"></div>
      <div class="field"><label>Veröffentlichungsdatum</label><input class="input" type="date" id="upPub" value="${x&&x.published?x.published:today()}"></div>
      <div class="field"><label>Ablaufdatum (optional)</label><input class="input" type="date" id="upExp" value="${x?x.expires:''}"></div>
    </div>
    <div class="grid-2">
      <div class="field"><label>Status</label><select class="select" id="upStatus">
        <option value="draft" ${x&&x.status==='draft'?'selected':''}>Entwurf (nicht sichtbar)</option>
        <option value="published" ${!x||x.status==='published'?'selected':''}>Freigegeben (öffentlich)</option>
        <option value="archived" ${x&&x.status==='archived'?'selected':''}>Archiviert</option>
      </select></div>
      <label class="check" style="align-self:end;margin-bottom:18px"><input type="checkbox" id="upImp" ${x&&x.important?'checked':''}> <span>Als <b>wichtig</b> markieren</span></label>
    </div>`;
  const foot=`<button class="btn subtle" onclick="closeModal()">Abbrechen</button><button class="btn" onclick="saveUpload('${editId||''}')">${x?'✓ Speichern':'✓ Hochladen & Speichern'}</button>`;
  openModal(x?'Dokument bearbeiten':'Neues Dokument hochladen',body,foot,true);
  // wire dropzone
  setTimeout(()=>{
    const dz=$('#dz'),fi=$('#fileInput'),fl=$('#fileList');
    if(dz){
      dz.onclick=()=>fi.click();
      fi.onchange=()=>showPicked(fi.files,fl);
      ['dragover','dragenter'].forEach(ev=>dz.addEventListener(ev,e=>{e.preventDefault();dz.classList.add('over');}));
      ['dragleave','drop'].forEach(ev=>dz.addEventListener(ev,e=>{e.preventDefault();dz.classList.remove('over');}));
      dz.addEventListener('drop',e=>{fi.files=e.dataTransfer.files;showPicked(e.dataTransfer.files,fl);});
    }
    const cat=$('#upCat');cat.onchange=()=>{$('#upCatNew').classList.toggle('hidden',cat.value!=='__new');};
  },0);

window._picked=[];
function showPicked(files,host){
  window._picked=[...files];host.innerHTML='';
  [...files].forEach(f=>{
    const ext=f.name.split('.').pop().toLowerCase();
    const ok=ALLOWED_TYPES.includes(ext)&&f.size<=MAX_MB*1024*1024;
    const[fc,ft]=fileMeta(ext);
    host.appendChild(el('div','file-item',`
      <div class="file-ic ${fc}" style="width:36px;height:36px;font-size:15px">${ft}</div>
      <div class="fi-name">${esc(f.name)}</div>
      <div class="fi-size">${fmtSize(f.size)}</div>
      ${ok?'<span class="badge b-green"><span class="b-dot"></span>OK</span>':'<span class="badge b-red"><span class="b-dot"></span>Ungültig</span>'}`));
  });
}
function saveUpload(editId){
  const title=$('#upTitle').value.trim();
  if(!title){toast('Titel erforderlich','err');return;}
  let cat=$('#upCat').value;
  if(cat==='__new'){cat=$('#upCatNew').value.trim();if(!cat){toast('Kategorie-Name fehlt','err');return;}if(!DB.categories.includes(cat))DB.categories.push(cat);}
  const status=$('#upStatus').value;
  const common={title,desc:$('#upDesc').value.trim(),category:cat,owner:$('#upOwner').value.trim()||'—',status,important:$('#upImp').checked,published:$('#upPub').value,expires:$('#upExp').value,project:$('#upProj').value||null};
  if(editId){
    const x=DB.documents.find(d=>d.id===editId);
    const replaced=$('#replaceInput')&&$('#replaceInput').files.length;
    Object.assign(x,common);
    if(replaced){const f=$('#replaceInput').files[0];const ext=f.name.split('.').pop().toLowerCase();if(!ALLOWED_TYPES.includes(ext)){toast('Dateityp nicht erlaubt','err');return;}x.fileName=f.name;x.fileType=ext;x.size=f.size;x.version++;x.uploaded=today();}
    save();logAction(replaced?`Dokument ersetzt → v${x.version}`:'Dokument bearbeitet',x.title,replaced?'♻️':'✎');
    toast('Dokument gespeichert','ok');
  }else{
    const picked=window._picked||[];
    if(!picked.length){toast('Bitte Datei auswählen','err');return;}
    const invalid=picked.find(f=>{const e=f.name.split('.').pop().toLowerCase();return !ALLOWED_TYPES.includes(e)||f.size>MAX_MB*1024*1024;});
    if(invalid){toast('Ungültiger Dateityp oder zu gross: '+invalid.name,'err');return;}
    picked.forEach((f,idx)=>{
      const ext=f.name.split('.').pop().toLowerCase();
      DB.documents.unshift({id:uid('d'),dept:session.dept,fileName:f.name,fileType:ext,size:f.size,version:1,uploaded:today(),...common,title:picked.length>1?`${title} (${idx+1})`:title});
    });
    save();logAction('Dokument hochgeladen',title+(picked.length>1?` (${picked.length} Dateien)`:''),'📤');
    toast(picked.length>1?picked.length+' Dokumente hochgeladen':'Dokument hochgeladen','ok');
    window._picked=[];
  }
  closeModal();
  const sb=$('.sheet-body');if(sb&&$('#docList')){refreshDocList(dept());}
  else{goHome();}
  goHomeRefresh();
}

function openModal(title,body,foot,wide){
  closeModal();
  const w=el('div','modal-wrap');w.id='mdl';

  m.innerHTML=`<div class="modal-head"><h3>${esc(title)}</h3><button class="btn-close" onclick="closeModal()">✕</button></div><div class="modal-body">${body}</div>${foot?`<div class="modal-foot">${foot}</div>`:''}`;

}

    `<button class="btn subtle" onclick="closeModal()">Abbrechen</button><button class="btn danger" id="cfmOk">${esc(okTxt)}</button>`);

}

/* Generic admin list builder */
function adminList(b,items,cols,opts){
  const head=`<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px">
    <h3 style="font-size:20px">${opts.title} (${items.length})</h3>
    <button class="btn" onclick="${opts.add}">＋ Neu</button></div>`;
  if(!items.length){b.innerHTML=head+empty(opts.ic||'📄','Noch keine Einträge');return;}
  const rows=items.map(it=>`<tr>${cols.map(c=>`<td>${c.render(it)}</td>`).join('')}
    <td><div class="row-actions">
      <button class="ico-btn" title="Bearbeiten" onclick="${opts.edit}('${it.id}')">✎</button>
      <button class="ico-btn danger" title="Löschen" onclick="${opts.del}('${it.id}')">🗑</button>
    </div></td></tr>`).join('');
  b.innerHTML=head+`<div class="table-wrap"><table><thead><tr>${cols.map(c=>`<th>${c.h}</th>`).join('')}<th style="text-align:right">Aktionen</th></tr></thead><tbody>${rows}</tbody></table></div>`;
}

      ${avail.length?avail.map(k=>`<button class="btn ghost sm" onclick="addBuiltinTile('${k}')">${TILES[k].icon} ＋ ${esc(TILES[k].name)}</button>`).join(''):'<span style="color:var(--text-soft)">Alle Standard-Kacheln bereits aktiv</span>'}
    </div>
    <div class="sec-title">Dokumenten-Galerie</div>

  layout.forEach((item,i)=>{

function saveGallery(id){
  const title=$('#gTitle').value.trim();if(!title){toast('Titel fehlt','err');return;}
  const docIds=[...document.querySelectorAll('.gDoc:checked')].map(c=>c.value);
  const data={title,icon:$('#gIcon').value.trim()||'📁',color:$('#gColor').value,docIds};
  if(id){Object.assign(DB.layout[session.dept].find(x=>x.id===id),data);logAction('Galerie bearbeitet',title,'📁');}
  else{DB.layout[session.dept].push({id:uid('gl'),type:'docgallery',...data});logAction('Galerie erstellt',title,'📁');}
  save();toast('Galerie gespeichert','ok');closeModal();refreshAdmin();goHomeRefresh();
}

/* ----- Admin: Log ----- */
function adminLog(b,d){
  b.innerHTML=`<h3 style="font-size:20px;margin-bottom:8px">Änderungsprotokoll</h3>
    <p style="color:var(--text-soft);margin-bottom:16px">Alle Änderungen mit Benutzer, Datum und Uhrzeit.</p>
    <div class="panel"><div class="panel-body">${DB.log.map(l=>`
      <div class="log-item"><div class="log-ic">${l.ic}</div>
        <div style="flex:1"><b>${esc(l.action)}</b>${l.target?` · ${esc(l.target)}`:''}<div style="font-size:13px;color:var(--text-soft)">👤 ${esc(l.user)}</div></div>
        <div class="log-time">${esc(l.time)}</div></div>`).join('')||'<div style="color:var(--text-soft)">Keine Einträge</div>'}</div></div>`;
}
function refreshAdmin(){const host=$('.sheet-body');if(host&&$('#adminBody')){const b=el('div');renderAdmin(b);host.innerHTML='';host.appendChild(b);}}
function goHomeRefresh(){const m=$('#mainView');if(m&&$('#tiles')){renderHome(m);}}

/* =========================================================================
   USER & ROLE MANAGEMENT (sysadmin) + DEPT MANAGEMENT
   ========================================================================= */
let userTab='users';
function openUsers(){
  if(!isSys()){toast('Nur System-Admin','err');return;}
  userTab='users';
  const body=el('div');renderUserMgmt(body);
  openOverlay(sheet('Benutzer & Abteilungen','👥','Systemverwaltung',body));
}
function renderUserMgmt(host){
  host.innerHTML=`<div class="tabs">
    <button class="tab ${userTab==='users'?'active':''}" onclick="setUserTab('users')">Benutzer & Rollen</button>
    <button class="tab ${userTab==='depts'?'active':''}" onclick="setUserTab('depts')">Abteilungen</button>
  </div><div id="umBody"></div>`;
  const b=$('#umBody',host);
  if(userTab==='users')umUsers(b);else umDepts(b);
}
function setUserTab(k){userTab=k;const host=$('.sheet-body');if(host){const b=el('div');renderUserMgmt(b);host.innerHTML='';host.appendChild(b);}}

function umUsers(b){
  const roleName={sysadmin:'System-Admin',deptadmin:'Abteilungs-Admin',employee:'Mitarbeiter/in'};
  const roleBadge={sysadmin:'b-red',deptadmin:'b-info',employee:'b-gray'};
  const rows=DB.users.map(u=>`<tr>
    <td><div class="file-cell"><div class="avatar" style="width:40px;height:40px;border-radius:50%;background:var(--blue);color:#fff;display:grid;place-items:center;font-weight:700">${esc(u.initials)}</div><div><div class="f-title">${esc(u.name)}</div><div class="f-name">${esc(u.email)}</div></div></div></td>
    <td><span class="badge ${roleBadge[u.role]}"><span class="b-dot"></span>${roleName[u.role]}</span></td>
    <td>${u.dept?esc(dept(u.dept).name):'<span style="color:var(--text-soft)">Alle</span>'}</td>
    <td><div class="row-actions"><button class="ico-btn" onclick="editUser('${u.id}')">✎</button><button class="ico-btn danger" onclick="delUser('${u.id}')">🗑</button></div></td>
  </tr>`).join('');
  b.innerHTML=`<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px">
      <h3 style="font-size:20px">Benutzer (${DB.users.length})</h3><button class="btn" onclick="editUser()">＋ Benutzer</button></div>
    <div class="table-wrap"><table><thead><tr><th>Benutzer</th><th>Rolle</th><th>Abteilung</th><th style="text-align:right">Aktionen</th></tr></thead><tbody>${rows}</tbody></table></div>
    <div class="sec-title">Rollen & Berechtigungen</div>
    <div class="cols">
      <div class="panel"><div class="panel-head"><h3>👁 Mitarbeiter/in</h3></div><div class="panel-body" style="color:var(--text-soft)">Nur Leserechte. Sieht ausschliesslich freigegebene Inhalte der eigenen Abteilung. Kann Dokumente lesen und herunterladen.</div></div>
      <div class="panel"><div class="panel-head"><h3>✎ Abteilungs-Admin</h3></div><div class="panel-body" style="color:var(--text-soft)">Erstellt und verwaltet alle Inhalte der <b>eigenen</b> Abteilung. Kann keine anderen Abteilungen bearbeiten.</div></div>
      <div class="panel"><div class="panel-head"><h3>⚙️ System-Admin</h3></div><div class="panel-body" style="color:var(--text-soft)">Voller Zugriff: alle Abteilungen, Benutzer- und Rollenverwaltung, Systemeinstellungen.</div></div>
    </div>`;
}
function editUser(id){
  const u=id?DB.users.find(x=>x.id===id):null;
  const body=`
    <div class="field"><label>Name <span class="req">*</span></label><input class="input" id="uName" value="${u?esc(u.name):''}"></div>
    <div class="field"><label>E-Mail</label><input class="input" id="uEmail" value="${u?esc(u.email):''}"></div>
    <div class="grid-2">
      <div class="field"><label>Rolle</label><select class="select" id="uRole" onchange="toggleUserDept()">
        <option value="employee" ${!u||u.role==='employee'?'selected':''}>Mitarbeiter/in</option>
        <option value="deptadmin" ${u&&u.role==='deptadmin'?'selected':''}>Abteilungs-Admin</option>
        <option value="sysadmin" ${u&&u.role==='sysadmin'?'selected':''}>System-Admin</option>
      </select></div>
      <div class="field" id="uDeptField"><label>Abteilung</label><select class="select" id="uDept">${DB.departments.map(d=>`<option value="${d.id}" ${u&&u.dept===d.id?'selected':''}>${esc(d.name)}</option>`).join('')}</select></div>
    </div>`;
  openModal(u?'Benutzer bearbeiten':'Neuer Benutzer',body,
    `<button class="btn subtle" onclick="closeModal()">Abbrechen</button><button class="btn" onclick="saveUser('${id||''}')">✓ Speichern</button>`);
  setTimeout(toggleUserDept,0);
}
function toggleUserDept(){const r=$('#uRole').value;$('#uDeptField').style.visibility=r==='sysadmin'?'hidden':'visible';}
function saveUser(id){
  const name=$('#uName').value.trim();if(!name){toast('Name fehlt','err');return;}
  const role=$('#uRole').value;
  const initials=name.split(' ').map(p=>p[0]).join('').toUpperCase().slice(0,2);
  const data={name,email:$('#uEmail').value.trim(),role,dept:role==='sysadmin'?null:$('#uDept').value,initials};
  if(id){Object.assign(DB.users.find(x=>x.id===id),data);logAction('Benutzer bearbeitet',name,'👤');}
  else{DB.users.push({id:uid('u'),...data});logAction('Benutzer angelegt',name,'👤');}
  save();toast('Gespeichert','ok');closeModal();refreshUserMgmt();buildQuickUsers();
}
function delUser(id){const u=DB.users.find(x=>x.id===id);if(session.user&&session.user.id===id){toast('Aktiver Benutzer','err');return;}confirmModal('Benutzer löschen?',`«${u.name}» löschen?`,'Löschen',()=>{DB.users=DB.users.filter(x=>x.id!==id);save();logAction('Benutzer gelöscht',u.name,'🗑');toast('Gelöscht','ok');refreshUserMgmt();buildQuickUsers();});}

function umDepts(b){
  const rows=DB.departments.map(d=>{
    const uc=DB.users.filter(u=>u.dept===d.id).length;
    const dc=DB.documents.filter(x=>x.dept===d.id).length;
    return `<tr>
      <td><div class="file-cell"><div class="ic" style="width:44px;height:44px;border-radius:11px;background:${d.color}22;display:grid;place-items:center;font-size:22px">${d.icon}</div><div><div class="f-title">${esc(d.name)}</div><div class="f-name">${esc(d.location)}</div></div></div></td>
      <td>${uc} Nutzer</td><td>${dc} Dok.</td>
      <td><span class="badge b-info"><span class="b-dot" style="background:${d.color}"></span>${d.id}</span></td>
      <td><div class="row-actions"><button class="ico-btn" onclick="editDept('${d.id}')">✎</button><button class="ico-btn danger" onclick="delDept('${d.id}')">🗑</button></div></td>
    </tr>`;}).join('');
  b.innerHTML=`<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px">
      <h3 style="font-size:20px">Abteilungen (${DB.departments.length})</h3><button class="btn" onclick="editDept()">＋ Abteilung</button></div>
    <div class="table-wrap"><table><thead><tr><th>Abteilung</th><th>Nutzer</th><th>Dokumente</th><th>Kürzel</th><th style="text-align:right">Aktionen</th></tr></thead><tbody>${rows}</tbody></table></div>
    <p style="margin-top:14px;color:var(--text-soft);font-size:14px">Neue Abteilungen und Module lassen sich jederzeit ergänzen — die Anwendung ist modular aufgebaut.</p>`;
}
function editDept(id){
  const d=id?DB.departments.find(x=>x.id===id):null;
  const body=`
    <div class="field"><label>Name <span class="req">*</span></label><input class="input" id="dName" value="${d?esc(d.name):''}"></div>
    <div class="grid-2">
      <div class="field"><label>Icon (Emoji)</label><input class="input" id="dIcon" value="${d?esc(d.icon):'🏢'}"></div>
      <div class="field"><label>Farbe</label><input class="input" type="color" id="dColor" value="${d?d.color:'#004b87'}" style="height:48px;padding:4px"></div>
    </div>
    <div class="field"><label>Standort</label><input class="input" id="dLoc" value="${d?esc(d.location):''}"></div>`;
  openModal(d?'Abteilung bearbeiten':'Neue Abteilung',body,
    `<button class="btn subtle" onclick="closeModal()">Abbrechen</button><button class="btn" onclick="saveDept('${id||''}')">✓ Speichern</button>`);
}
function saveDept(id){
  const name=$('#dName').value.trim();if(!name){toast('Name fehlt','err');return;}
  const data={name,icon:$('#dIcon').value.trim()||'🏢',color:$('#dColor').value,location:$('#dLoc').value.trim()};
  if(id){Object.assign(DB.departments.find(x=>x.id===id),data);logAction('Abteilung bearbeitet',name,'🏢');}
  else{const nid=name.toLowerCase().replace(/[^a-z0-9]/g,'').slice(0,6)+Math.floor(Math.random()*90+10);DB.departments.push({id:nid,...data});DB.info[nid]={lead:'',phone:'',members:0,mission:'',hours:''};DB.shifts[nid]={days:['Mo','Di','Mi','Do','Fr'],rows:[]};logAction('Abteilung erstellt',name,'🏢');}
  save();toast('Gespeichert','ok');closeModal();refreshUserMgmt();
}
function delDept(id){
  const d=DB.departments.find(x=>x.id===id);
  if(DB.departments.length<=1){toast('Mindestens eine Abteilung nötig','err');return;}
  confirmModal('Abteilung löschen?',`«${d.name}» und alle zugeordneten Inhalte werden entfernt.`,'Löschen',()=>{
    ['documents','projects','kpis','tasks','events','news'].forEach(k=>DB[k]=DB[k].filter(x=>x.dept!==id));
    DB.departments=DB.departments.filter(x=>x.id!==id);delete DB.info[id];delete DB.shifts[id];delete DB.layout[id];
    if(session.dept===id)session.dept=DB.departments[0].id;
    save();logAction('Abteilung gelöscht',d.name,'🗑');toast('Gelöscht','ok');refreshUserMgmt();render();
  });
}
function refreshUserMgmt(){const host=$('.sheet-body');if(host&&$('#umBody')){const b=el('div');renderUserMgmt(b);host.innerHTML='';host.appendChild(b);}}

/* =========================================================================
   AUTH
   ========================================================================= */
function buildQuickUsers(){
  const host=$('#quickUsers');if(!host)return;
  const roleName={sysadmin:'System-Admin · alle Abteilungen',deptadmin:'Abteilungs-Admin',employee:'Mitarbeiter/in · nur lesen'};
  host.innerHTML=DB.users.map(u=>`<button class="qu" onclick="loginAs('${u.id}')">
    <div class="avatar">${esc(u.initials)}</div>
    <div class="qu-info"><div class="qu-name">${esc(u.name)}</div><div class="qu-role">${roleName[u.role]}${u.dept?' · '+esc(dept(u.dept).name):''}</div></div>
    <span style="color:var(--blue)">→</span>
  </button>`).join('');
}
function loginAs(id){
  const u=DB.users.find(x=>x.id===id);if(!u)return;
  session.user=u;session.dept=u.dept||DB.departments[0].id;
  $('#loginScreen').classList.add('hidden');
  logAction('Angemeldet','',' 🔓');
  render();toast('Willkommen, '+u.name.split(' ')[0]+'!','ok');
}
function loginPublic(){session.user=null;session.dept=DB.departments[0].id;$('#loginScreen').classList.add('hidden');render();toast('Öffentlicher Modus','info');}
function logout(){session.user=null;showLogin();}
function showLogin(){buildQuickUsers();$('#loginScreen').classList.remove('hidden');}

/* =========================================================================
   CLOCK
   ========================================================================= */
function tickClock(){const c=$('#clock');if(c){const n=new Date();const days=['So','Mo','Di','Mi','Do','Fr','Sa'];c.textContent=`${days[n.getDay()]} 15.07.2026 · ${n.toTimeString().slice(0,8)}`;}}
setInterval(tickClock,1000);

/* =========================================================================
   INIT
   ========================================================================= */
buildQuickUsers();
render();
tickClock();
</script>
</body>
</html>
